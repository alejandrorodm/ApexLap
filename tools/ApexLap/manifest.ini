[ABOUT]
NAME = ApexLap Uploader
AUTHOR = alejandrorodm
VERSION = 1.0
DESCRIPTION = Sube automáticamente tus vueltas limpias de Assetto Corsa a tu liga de ApexLap.

; App en Lua de Custom Shaders Patch (CSP). IMPORTANTE: el script principal DEBE
; llamarse igual que la carpeta (carpeta ApexLap → ApexLap.lua). La ventana llama
; a la función script.windowMain.
; LAZY es el MODO de carga (NONE | PARTIAL | FULL). NONE = carga el script al
; arrancar AC (así el script se ejecuta seguro; verás "[ApexLap] script cargado"
; en el log de CSP).
[CORE]
LAZY = NONE

[WINDOW_0]
ID = main
NAME = ApexLap
ICON = icon.png
FUNCTION_MAIN = windowMain
MIN_SIZE = 260, 120
SIZE = 360, 460
