[ABOUT]
NAME = ApexLap Uploader
AUTHOR = alejandrorodm
VERSION = 1.0
DESCRIPTION = Sube automáticamente tus vueltas limpias de Assetto Corsa a tu liga de ApexLap.

; App en Lua de Custom Shaders Patch (CSP). CSP carga el .lua de la carpeta
; (ApexLapUploader.lua) y la ventana llama a la función script.windowMain.
; LAZY es el MODO de carga (NONE | PARTIAL | FULL), NO el nombre del script.
[CORE]
LAZY = FULL

[WINDOW_0]
ID = main
NAME = ApexLap
FUNCTION_MAIN = windowMain
MIN_SIZE = 260, 120
SIZE = 360, 460
RESIZABLE = 1
